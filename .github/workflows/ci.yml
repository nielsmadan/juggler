name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Just
        run: brew install just

      - name: Build (strict, zero warnings)
        run: just build-strict ci.xcconfig

      - name: Test + coverage
        run: just coverage ci.xcconfig

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Just and SwiftLint
        run: brew install just swiftlint

      - name: Lint
        run: just lint

  unused-check:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Just and Periphery
        run: |
          brew install just
          brew install --cask peripheryapp/periphery/periphery

      - name: Check for unused code
        run: just unused-check
